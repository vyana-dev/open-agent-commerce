<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="'Trebuchet MS', Verdana, sans-serif">
  <rect x="5" y="5" width="750" height="470" rx="12" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <rect x="5" y="5" width="750" height="46" rx="12" fill="#111827"/>
  <circle cx="34" cy="28" r="16" fill="#4f46e5"/><text x="34" y="34" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">4</text>
  <text x="60" y="34" fill="#f9fafb" font-size="19" font-weight="bold">THE ACCOUNT IS YOURS</text>

  <!-- broker -->
  <g transform="translate(120,170)">
    <path d="M0,-40 L30,-28 L30,8 Q30,40 0,56 Q-30,40 -30,8 L-30,-28 Z" fill="#4f46e5"/>
    <path d="M-12,8 l8,9 l18,-22" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="84" text-anchor="middle" fill="#3730a3" font-size="13" font-weight="bold">VEE</text>
  </g>
  <!-- arrow to merchant -->
  <line x1="160" y1="150" x2="270" y2="150" stroke="#111827" stroke-width="3"/>
  <polygon points="270,150 258,143 258,157" fill="#111827"/>
  <text x="215" y="138" text-anchor="middle" fill="#6b7280" font-size="12">provision</text>
  <!-- merchant -->
  <g transform="translate(330,160)">
    <rect x="-34" y="-8" width="68" height="70" rx="6" fill="#e11d48"/>
    <path d="M-38,-8 L38,-8 L26,-32 L-26,-32 Z" fill="#fb7185"/>
    <rect x="-11" y="26" width="22" height="36" fill="#7f1d1d"/>
    <text x="0" y="86" text-anchor="middle" fill="#9f1239" font-size="13" font-weight="bold">NewsApp</text>
  </g>
  <!-- returns receipts -->
  <line x1="380" y1="150" x2="470" y2="150" stroke="#16a34a" stroke-width="3"/>
  <polygon points="470,150 458,143 458,157" fill="#16a34a"/>
  <text x="425" y="138" text-anchor="middle" fill="#16a34a" font-size="12">ACR + AOC</text>

  <!-- ownership certificate handed to Maya -->
  <g transform="translate(490,86)">
    <rect x="0" y="0" width="250" height="150" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/>
    <text x="125" y="34" text-anchor="middle" fill="#065f46" font-size="16" font-weight="bold">Account Ownership</text>
    <text x="125" y="56" text-anchor="middle" fill="#065f46" font-size="16" font-weight="bold">Certificate</text>
    <path d="M40,86 l16,18 l34,-44" transform="translate(20,8)" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="150" y="104" fill="#166534" font-size="13">direct-claim link</text>
    <text x="150" y="124" fill="#166534" font-size="13">single-use token</text>
  </g>
  <!-- Maya -->
  <g transform="translate(620,300)">
    <circle cx="0" cy="0" r="26" fill="#f59e0b"/>
    <rect x="-26" y="30" width="52" height="56" rx="14" fill="#f59e0b"/>
    <text x="0" y="112" text-anchor="middle" fill="#92400e" font-size="13" font-weight="bold">MAYA</text>
  </g>

  <rect x="5" y="404" width="750" height="71" rx="12" fill="#111827"/>
  <text x="28" y="436" fill="#f9fafb" font-size="16">The account gets created — and Maya receives an <tspan font-weight="bold" fill="#86efac">Ownership Certificate.</tspan></text>
  <text x="28" y="461" fill="#f9fafb" font-size="16">Even if the broker vanished tomorrow, <tspan font-weight="bold" fill="#a5b4fc">the account is hers to claim directly.</tspan></text>
</svg>
