<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="'Trebuchet MS', Verdana, sans-serif">
  <rect x="5" y="5" width="750" height="470" rx="12" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <rect x="5" y="5" width="750" height="46" rx="12" fill="#111827"/>
  <circle cx="34" cy="28" r="16" fill="#4f46e5"/><text x="34" y="34" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">1</text>
  <text x="60" y="34" fill="#f9fafb" font-size="19" font-weight="bold">THE ASK</text>

  <!-- Maya -->
  <g transform="translate(150,200)">
    <circle cx="0" cy="0" r="30" fill="#f59e0b"/>
    <rect x="-30" y="36" width="60" height="74" rx="16" fill="#f59e0b"/>
    <text x="0" y="138" text-anchor="middle" fill="#92400e" font-size="14" font-weight="bold">MAYA</text>
  </g>
  <!-- speech bubble -->
  <g transform="translate(250,110)">
    <rect x="0" y="0" width="430" height="120" rx="16" fill="#f3f4f6" stroke="#111827" stroke-width="3"/>
    <polygon points="20,118 -22,150 56,118" fill="#f3f4f6" stroke="#111827" stroke-width="3"/>
    <text x="26" y="44" fill="#111827" font-size="20" font-weight="bold">“Sign me up for NewsApp.</text>
    <text x="26" y="78" fill="#111827" font-size="20" font-weight="bold">Keep it under ₹500 / month,</text>
    <text x="26" y="106" fill="#111827" font-size="20" font-weight="bold">and you can cancel anytime.”</text>
  </g>
  <!-- agent -->
  <g transform="translate(610,210)">
    <line x1="0" y1="-46" x2="0" y2="-30" stroke="#0d9488" stroke-width="3"/><circle cx="0" cy="-49" r="4" fill="#0d9488"/>
    <rect x="-32" y="-30" width="64" height="52" rx="12" fill="#0d9488"/>
    <circle cx="-11" cy="-5" r="7" fill="#022c22"/><circle cx="11" cy="-5" r="7" fill="#022c22"/>
    <rect x="-28" y="30" width="56" height="64" rx="14" fill="#0d9488"/>
    <text x="0" y="120" text-anchor="middle" fill="#0f766e" font-size="14" font-weight="bold">ADA</text>
  </g>

  <rect x="5" y="404" width="750" height="71" rx="12" fill="#111827"/>
  <text x="28" y="436" fill="#f9fafb" font-size="16">Maya delegates a task to her agent — in plain words. She states</text>
  <text x="28" y="461" fill="#a5b4fc" font-size="16" font-weight="bold">what, how much, and that she stays in control.</text>
</svg>
