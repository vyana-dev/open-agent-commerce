<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="'Trebuchet MS', Verdana, sans-serif">
  <rect x="5" y="5" width="750" height="470" rx="12" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <rect x="5" y="5" width="750" height="46" rx="12" fill="#111827"/>
  <circle cx="34" cy="28" r="16" fill="#4f46e5"/><text x="34" y="34" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">7</text>
  <text x="60" y="34" fill="#f9fafb" font-size="19" font-weight="bold">TAKE IT BACK</text>

  <!-- Maya -->
  <g transform="translate(95,150)">
    <circle cx="0" cy="0" r="28" fill="#f59e0b"/>
    <rect x="-28" y="34" width="56" height="64" rx="14" fill="#f59e0b"/>
    <text x="0" y="124" text-anchor="middle" fill="#92400e" font-size="13" font-weight="bold">MAYA</text>
  </g>
  <!-- AOC document she carries -->
  <g transform="translate(150,80)">
    <rect x="0" y="0" width="240" height="120" rx="12" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/>
    <text x="120" y="28" text-anchor="middle" fill="#065f46" font-size="15" font-weight="bold">Ownership Certificate</text>
    <line x1="16" y1="38" x2="224" y2="38" stroke="#a7f3d0" stroke-width="2"/>
    <text x="16" y="62" fill="#065f46" font-size="13">• direct-claim link</text>
    <text x="16" y="84" fill="#065f46" font-size="13">• single-use token</text>
    <text x="16" y="106" fill="#065f46" font-size="13">• service-signed ✓</text>
  </g>

  <!-- faded, offline broker that is bypassed -->
  <g transform="translate(395,300)" opacity="0.32">
    <path d="M0,-34 L26,-24 L26,8 Q26,34 0,48 Q-26,34 -26,8 L-26,-24 Z" fill="#4f46e5" stroke="#4f46e5" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="0" y="70" text-anchor="middle" fill="#6b7280" font-size="13" font-weight="bold">VEE — offline?</text>
  </g>
  <text x="395" y="248" text-anchor="middle" fill="#9ca3af" font-size="13">broker not in the loop</text>

  <!-- direct claim arrow Maya -> Service, bypassing broker -->
  <line x1="400" y1="150" x2="565" y2="150" stroke="#111827" stroke-width="4"/>
  <polygon points="565,150 551,142 551,158" fill="#111827"/>
  <text x="478" y="138" text-anchor="middle" fill="#111827" font-size="13" font-weight="bold">direct claim</text>

  <!-- Service / merchant -->
  <g transform="translate(640,140)">
    <rect x="-36" y="-8" width="72" height="74" rx="6" fill="#e11d48"/>
    <path d="M-40,-8 L40,-8 L28,-32 L-28,-32 Z" fill="#fb7185"/>
    <rect x="-12" y="28" width="24" height="38" fill="#7f1d1d"/>
    <text x="0" y="92" text-anchor="middle" fill="#9f1239" font-size="13" font-weight="bold">NewsApp</text>
  </g>
  <!-- verified -> ownership to Maya -->
  <g transform="translate(560,210)">
    <rect x="0" y="0" width="180" height="56" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="90" y="24" text-anchor="middle" fill="#166534" font-size="14" font-weight="bold">verified ✓</text>
    <text x="90" y="44" text-anchor="middle" fill="#166534" font-size="13">ownership → Maya</text>
  </g>

  <rect x="5" y="404" width="750" height="71" rx="12" fill="#111827"/>
  <text x="28" y="436" fill="#f9fafb" font-size="16">The Ownership Certificate is a <tspan font-weight="bold" fill="#86efac">direct path to claim the account at the service itself.</tspan></text>
  <text x="28" y="461" fill="#f9fafb" font-size="16">Single-use, service-signed — Maya takes full control <tspan font-weight="bold" fill="#fcd34d">even if the broker disappears.</tspan></text>
</svg>
