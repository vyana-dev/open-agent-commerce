<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="'Trebuchet MS', Verdana, sans-serif">
  <rect x="5" y="5" width="750" height="470" rx="12" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <rect x="5" y="5" width="750" height="46" rx="12" fill="#111827"/>
  <circle cx="34" cy="28" r="16" fill="#4f46e5"/><text x="34" y="34" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">8</text>
  <text x="60" y="34" fill="#f9fafb" font-size="19" font-weight="bold">ONE REFEREE FOR EVERY RAIL</text>

  <!-- three inbound rails -->
  <g font-size="13" font-weight="bold" text-anchor="middle">
    <rect x="30" y="80" width="150" height="40" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/><text x="105" y="105" fill="#854d0e">Visa TAP</text>
    <rect x="30" y="150" width="150" height="40" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="105" y="175" fill="#1e3a8a">Google AP2</text>
    <rect x="30" y="220" width="150" height="40" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="105" y="245" fill="#5b21b6">Stripe/OpenAI ACP</text>
  </g>
  <!-- arrows into adapter -->
  <line x1="180" y1="100" x2="270" y2="160" stroke="#9ca3af" stroke-width="3"/>
  <line x1="180" y1="170" x2="270" y2="170" stroke="#9ca3af" stroke-width="3"/>
  <line x1="180" y1="240" x2="270" y2="180" stroke="#9ca3af" stroke-width="3"/>

  <!-- unified request funnel -->
  <g transform="translate(270,128)">
    <rect x="0" y="0" width="190" height="84" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
    <text x="95" y="34" text-anchor="middle" fill="#3730a3" font-size="15" font-weight="bold">Unified</text>
    <text x="95" y="56" text-anchor="middle" fill="#3730a3" font-size="15" font-weight="bold">Authorization</text>
    <text x="95" y="74" text-anchor="middle" fill="#6366f1" font-size="12">one request shape</text>
  </g>
  <line x1="460" y1="170" x2="540" y2="170" stroke="#111827" stroke-width="3"/><polygon points="540,170 528,163 528,177" fill="#111827"/>

  <!-- one verifier -->
  <g transform="translate(560,128)">
    <path d="M70,-6 L100,6 L100,42 Q100,74 70,90 Q40,74 40,42 L40,6 Z" fill="#4f46e5"/>
    <path d="M58,42 l8,9 l18,-22" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="70" y="112" text-anchor="middle" fill="#3730a3" font-size="13" font-weight="bold">one verify chain</text>
    <text x="70" y="130" text-anchor="middle" fill="#334155" font-size="12">one provenance record</text>
  </g>

  <rect x="40" y="300" width="680" height="58" rx="12" fill="#0f172a"/>
  <text x="380" y="336" text-anchor="middle" fill="#a5b4fc" font-size="20" font-weight="bold">Consent in. Proof out. No keys. No custody.</text>

  <rect x="5" y="404" width="750" height="71" rx="12" fill="#111827"/>
  <text x="28" y="436" fill="#f9fafb" font-size="16">Agents arrive over many rails. Open Agent Commerce normalizes them all into</text>
  <text x="28" y="461" fill="#f9fafb" font-size="16"><tspan font-weight="bold" fill="#86efac">one verifiable request</tspan> — so one neutral referee checks them the same way.</text>
</svg>
