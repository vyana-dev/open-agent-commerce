<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="'Trebuchet MS', Verdana, sans-serif">
  <rect x="5" y="5" width="750" height="470" rx="12" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
  <rect x="5" y="5" width="750" height="46" rx="12" fill="#111827"/>
  <circle cx="34" cy="28" r="16" fill="#4f46e5"/><text x="34" y="34" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">5</text>
  <text x="60" y="34" fill="#f9fafb" font-size="19" font-weight="bold">PAY — WITHIN BOUNDS</text>

  <!-- divider -->
  <line x1="380" y1="60" x2="380" y2="396" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- LEFT: within cap, paid -->
  <text x="195" y="86" text-anchor="middle" fill="#16a34a" font-size="16" font-weight="bold">₹499  ·  within cap</text>
  <g transform="translate(120,150)">
    <line x1="0" y1="-36" x2="0" y2="-24" stroke="#0d9488" stroke-width="3"/><circle cx="0" cy="-39" r="4" fill="#0d9488"/>
    <rect x="-24" y="-24" width="48" height="40" rx="9" fill="#0d9488"/>
    <circle cx="-9" cy="-5" r="5" fill="#022c22"/><circle cx="9" cy="-5" r="5" fill="#022c22"/>
    <rect x="-20" y="22" width="40" height="42" rx="10" fill="#0d9488"/>
  </g>
  <line x1="150" y1="150" x2="230" y2="150" stroke="#16a34a" stroke-width="3"/><polygon points="230,150 218,143 218,157" fill="#16a34a"/>
  <g transform="translate(250,118)">
    <circle cx="35" cy="32" r="34" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <path d="M18,34 l12,13 l24,-28" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="195" y="232" text-anchor="middle" fill="#166534" font-size="15" font-weight="bold">PAID ✓ + signed receipt</text>

  <!-- RIGHT: over cap, ask -->
  <text x="565" y="86" text-anchor="middle" fill="#dc2626" font-size="16" font-weight="bold">₹900  ·  over cap</text>
  <g transform="translate(490,150)">
    <line x1="0" y1="-36" x2="0" y2="-24" stroke="#0d9488" stroke-width="3"/><circle cx="0" cy="-39" r="4" fill="#0d9488"/>
    <rect x="-24" y="-24" width="48" height="40" rx="9" fill="#0d9488"/>
    <circle cx="-9" cy="-5" r="5" fill="#022c22"/><circle cx="9" cy="-5" r="5" fill="#022c22"/>
    <rect x="-20" y="22" width="40" height="42" rx="10" fill="#0d9488"/>
  </g>
  <line x1="520" y1="150" x2="600" y2="150" stroke="#dc2626" stroke-width="3"/><polygon points="600,150 588,143 588,157" fill="#dc2626"/>
  <g transform="translate(615,120)">
    <circle cx="35" cy="30" r="34" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="35" y="42" text-anchor="middle" fill="#dc2626" font-size="34" font-weight="bold">!</text>
  </g>
  <g transform="translate(470,210)">
    <rect x="0" y="0" width="200" height="56" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
    <text x="100" y="24" text-anchor="middle" fill="#92400e" font-size="14" font-weight="bold">“Maya — approve this?”</text>
    <text x="100" y="44" text-anchor="middle" fill="#92400e" font-size="13">step-up to the user</text>
  </g>

  <rect x="5" y="404" width="750" height="71" rx="12" fill="#111827"/>
  <text x="28" y="436" fill="#f9fafb" font-size="16">Spending is checked against the consent caps on <tspan font-weight="bold" fill="#86efac">every</tspan> transaction.</text>
  <text x="28" y="461" fill="#f9fafb" font-size="16">Within bounds, it just works. <tspan font-weight="bold" fill="#fcd34d">Over the line, the agent must ask Maya first.</tspan></text>
</svg>
