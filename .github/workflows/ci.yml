name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install (workspace root)
        run: npm install
      - name: Typecheck + build
        run: |
          npm run typecheck
          npm run build
      - name: Run examples
        run: npm run examples
      - name: Conformance vectors
        run: npm run conformance
      - name: Validate JSON Schemas are well-formed
        run: |
          for f in schemas/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('ok: $f')"
          done
